<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Chariots Portal</title>
    
    <link rel="icon" type="image/png" href="images/cloud-chariots-logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col items-center py-10 px-4">

    <div class="text-center mb-10 flex flex-col items-center">
        <img src="images/cloud-chariots-logo.png" alt="Cloud Chariots Logo" class="h-16 w-auto mb-4 object-contain">
        <h1 class="text-4xl font-extrabold text-blue-900 tracking-tight">CLOUD CHARIOTS</h1>
        <p class="text-gray-600 mt-2 text-sm uppercase font-semibold tracking-wider">Internal Staff Portal</p>
    </div>

    <div class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">🚗 Daily Transport Tracker</h2>
            <p class="text-xs text-gray-500 mb-6">Log your daily transport fares. Total counts are sent to leadership at month-end for reimbursement.</p>
            
            <form id="transportForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Full Name</label>
                    <input type="text" id="t_name" required class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Company Email</label>
                    <input type="email" id="t_email" required class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-blue-500">
                </div>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full">
                    <div class="w-full flex flex-col">
                        <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Date</label>
                        <input type="date" id="t_date" required class="block w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-blue-500 box-border">
                    </div>
                    <div class="w-full flex flex-col">
                        <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Daily Fare Total (₦)</label>
                        <input type="number" id="t_amount" placeholder="e.g. 7000" required class="block w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-blue-500 box-border">
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-900 hover:bg-blue-800 text-white font-medium py-2 rounded-lg text-sm transition-colors shadow-sm">Submit Daily Entry</button>
            </form>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">💰 Payday Loan Request</h2>
            <p class="text-xs text-gray-500 mb-6">Need emergency funds? Request an advance from your current monthly salary cycle instantly.</p>
            
            <form id="loanForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Full Name</label>
                    <input type="text" id="l_name" required class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Company Email</label>
                    <input type="email" id="l_email" required class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-blue-500">
                </div>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full">
                    <div class="w-full flex flex-col">
                        <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Request Type</label>
                        <select id="l_type" class="block w-full px-3 py-2 border border-gray-200 rounded-lg text-sm bg-white focus:outline-blue-500 box-border">
                            <option value="Custom">Custom Amount</option>
                            <option value="Full">Full Month Salary</option>
                        </select>
                    </div>
                    <div class="w-full flex flex-col">
                        <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Desired Amount (₦)</label>
                        <input type="number" id="l_amount" placeholder="e.g. 50000" required class="block w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-blue-500 box-border">
                    </div>
                </div>
                <button type="submit" class="w-full bg-emerald-700 hover:bg-emerald-600 text-white font-medium py-2 rounded-lg text-sm transition-colors shadow-sm">Submit Loan Request</button>
            </form>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
